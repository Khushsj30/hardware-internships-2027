name: Scrape hardware jobs daily

on:
  schedule:
    - cron: "0 13 * * *"  # runs daily at 13:00 UTC — adjust as you like
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit and push if changed
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add README.md scripts/seen_jobs.json scripts/workday_companies.json
          git diff --quiet --cached || git commit -m "Auto-update job listings"
          git push
